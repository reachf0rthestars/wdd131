<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charecter Card</title>
    <link rel="stylesheet" href="charactercard.css" />
    <script defer src="variables.js"></script>
</head>
<body>
  <div class="card">

<p>Health: <span id="health">100</span></p>

</div>
    </div>
  </div>

</html>
