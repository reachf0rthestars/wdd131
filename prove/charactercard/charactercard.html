<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive character card for Snortleblat with level and health tracking.">
    <meta property="og:title" content="Snortleblat Character Card">
    <meta property="og:description" content="A dynamic character card for Snortleblat the Swamp Beast Diplomat.">
    <meta property="og:image" content="snortleblat.webp">
    <meta property="og:type" content="website">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Snortleblat Character Card">
    <meta name="twitter:description" content="Interactive character card with level and health updates.">
    <meta name="twitter:image" content="snortleblat.webp">


    <meta name="theme-color" content="#5d747b">

    <title>Character Card</title>

    <link rel="stylesheet" href="charactercard.css">
    <script defer src="variables.js"></script>
</head>

<body>
    <div class="card">
        <img class="image" src="snortleblat.webp" alt="Snortleblat character">

        <div class="name">Snortleblat</div>

        <div class="stats">
            <p>Class: Swamp Beast Diplomat</p>
            <p>Level: <span id="level">8</span></p>
            <p>Health: <span id="health">100</span></p>

            <div class="buttons">
                <button id="attackBtn" aria-label="Attack the character">Attacked</button>
                <button id="levelBtn" aria-label="Increase character level">Level Up</button>
            </div>
        </div>
    </div>
</body>
</html>
